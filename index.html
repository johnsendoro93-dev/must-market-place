<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUST Campus Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="glass-header">
        <h1>🏛️ MUST Marketplace</h1>
        <button onclick="openPostModal()" class="primary-btn">+ Post Item</button>
    </header>

    <main>
        <section id="marketplace-feed">
            <div class="loader">Fetching live items from campus...</div>
        </section>
    </main>

    <div id="postModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closePostModal()">&times;</span>
            <h2>Sell an Item</h2>
            <form id="postForm" onsubmit="handlePost(event)">
                <input type="text" id="itemName" placeholder="What are you selling?" required>
                <input type="number" id="itemPrice" placeholder="Price (TZS)" required>
                <textarea id="itemDesc" placeholder="Describe the item and your location (e.g., Block A)..." required></textarea>
                <input type="tel" id="sellerPhone" placeholder="Your Phone Number (e.g., 0712345678)" required>
                <button type="submit" class="submit-btn" id="submitBtn">Post to Marketplace</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
